name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never
        env:
          ELECTRON_BUILDER_AUTO_PUBLISH: false

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: pwsh
        run: |
          $releaseResponse = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" `
            -Method Post `
            -Headers @{
              "Authorization" = "token $env:GITHUB_TOKEN"
              "Accept" = "application/vnd.github.v3+json"
            } `
            -Body (@{
              tag_name = "v$env:VERSION"
              name = "Dynamic Wallpaper v$env:VERSION"
              body = "动态桌面壁纸 - 版本 v$env:VERSION`n`n## 修复内容`n- 修复窗口遮挡桌面图标问题`n- 修复托盘图标缺失`n- 支持多显示器全屏覆盖`n- 使用 Windows API 正确嵌入桌面"
              draft = $false
              prerelease = $false
            } | ConvertTo-Json)

          $releaseId = $releaseResponse.id
          Write-Host "Release created: v$env:VERSION (ID: $releaseId)"

          $files = Get-ChildItem dist/*.exe
          foreach ($file in $files) {
            Write-Host "Uploading $($file.Name)..."
            $uploadResponse = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/$releaseId/assets?name=$($file.Name)" `
              -Method Post `
              -Headers @{
                "Authorization" = "token $env:GITHUB_TOKEN"
                "Accept" = "application/vnd.github.v3+json"
                "Content-Type" = "application/octet-stream"
              } `
              -InFile $file.FullName `
              -ContentType "application/octet-stream"

            Write-Host "Uploaded: $($uploadResponse.name) ($($uploadResponse.size) bytes)"
          }

          Write-Host "Release v$env:VERSION completed!"
