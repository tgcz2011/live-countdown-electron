name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never
        env:
          ELECTRON_BUILDER_AUTO_PUBLISH: false

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: pwsh
        run: |
          $headers = @{
            "Authorization" = "token $env:GITHUB_TOKEN"
            "Accept" = "application/vnd.github.v3+json"
          }
          $repo = "${{ github.repository }}"
          $tag = "v$env:VERSION"

          # 删除已存在的 release
          try {
            $existing = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers
            Write-Host "Deleting existing release (ID: $($existing.id))..."
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($existing.id)" -Method Delete -Headers $headers
          } catch { Write-Host "No existing release" }

          # 删除已存在的标签 ref
          try {
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/git/refs/tags/$tag" -Method Delete -Headers $headers
          } catch { Write-Host "No existing tag ref" }

          # 创建 release
          $body = @{
            tag_name = $tag
            name = "Dynamic Wallpaper v$env:VERSION"
            body = "动态桌面壁纸 - 版本 v$env:VERSION`n`n## 修复内容`n- 修复窗口遮挡桌面图标问题`n- 修复托盘图标缺失`n- 支持多显示器全屏覆盖`n- 使用 Windows API 正确嵌入桌面"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          $releaseResponse = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases" `
            -Method Post `
            -Headers $headers `
            -Body $body

          $releaseId = $releaseResponse.id
          Write-Host "Release created: $tag (ID: $releaseId)"

          $files = Get-ChildItem dist/*.exe
          foreach ($file in $files) {
            Write-Host "Uploading $($file.Name)..."
            $uploadResponse = Invoke-RestMethod -Uri "https://uploads.github.com/repos/$repo/releases/$releaseId/assets?name=$($file.Name)" `
              -Method Post `
              -Headers @{
                "Authorization" = "token $env:GITHUB_TOKEN"
                "Accept" = "application/vnd.github.v3+json"
                "Content-Type" = "application/octet-stream"
              } `
              -InFile $file.FullName `
              -ContentType "application/octet-stream"

            Write-Host "Uploaded: $($uploadResponse.name) ($($uploadResponse.size) bytes)"
          }

          Write-Host "Release $tag completed!"
