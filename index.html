<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Wallpaper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #webview-container {
            width: 100%;
            height: 100%;
        }

        webview {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.9);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            font-size: 18px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            font-size: 16px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
            text-align: center;
            z-index: 10;
            max-width: 80%;
            line-height: 1.6;
        }

        .reload-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .reload-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">正在加载动态壁纸...</div>
    <div class="error" id="error" style="display: none;">
        <div>⚠️ 网页加载失败</div>
        <div id="error-message" style="font-size: 14px; margin-top: 10px; opacity: 0.8;"></div>
        <button class="reload-btn" onclick="reloadWebview()">重新加载</button>
    </div>
    <div id="webview-container">
        <webview
            id="wallpaper-webview"
            src="http://zztool.free.nf/countdown_project/?i=1"
            allowpopups="false"
            webpreferences="contextIsolation=yes"
        ></webview>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const webview = document.getElementById('wallpaper-webview');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const errorMessage = document.getElementById('error-message');

        let loadTimeout;

        function showError(message) {
          loading.classList.add('hidden');
          errorDiv.style.display = 'block';
          errorMessage.textContent = message || '无法加载网页，请检查网络连接或网页地址是否正确。';
        }

        function hideError() {
          errorDiv.style.display = 'none';
        }

        function reloadWebview() {
          hideError();
          loading.classList.remove('hidden');
          webview.reload();
        }

        webview.addEventListener('did-start-loading', () => {
          console.log('Page loading started');
          clearTimeout(loadTimeout);
          loadTimeout = setTimeout(() => {
            showError('加载超时，请检查网络连接');
          }, 15000);
        });

        webview.addEventListener('did-stop-loading', () => {
          console.log('Page loading finished');
          clearTimeout(loadTimeout);
          loading.classList.add('hidden');
          hideError();
        });

        webview.addEventListener('did-fail-load', (event) => {
          console.error('Page failed to load:', event.errorDescription);
          clearTimeout(loadTimeout);
          const errorMsg = event.errorDescription || '未知错误';
          showError('加载失败: ' + errorMsg);
        });

        webview.addEventListener('dom-ready', () => {
          console.log('DOM is ready');
        });

        webview.addEventListener('crashed', (event) => {
          console.error('Webview crashed:', event);
          showError('浏览器窗口崩溃，请重启程序');
        });

        // 监听主进程的 URL 更新
        ipcRenderer.on('update-url', (event, newUrl) => {
          webview.src = newUrl;
        });

        // Prevent right-click menu
        webview.addEventListener('context-menu', (e) => {
          e.preventDefault();
        });

        // Initialize
        console.log('Dynamic Wallpaper initialized');
    </script>
</body>
</html>
